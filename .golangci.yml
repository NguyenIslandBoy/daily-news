# .golangci.yml
# Compatible with golangci-lint v2.x
# https://golangci-lint.run/usage/configuration/

version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gofmt
    - goimports
    - misspell
    - noctx
    - bodyclose
    - unused

settings:
  gofmt:
    simplify: true

  goimports:
    local-prefixes:
      - github.com/NguyenIslandBoy/daily-news

  misspell:
    locale: US

  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck