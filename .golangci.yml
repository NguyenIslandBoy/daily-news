# .golangci.yml
# Compatible with golangci-lint v2.x
# https://golangci-lint.run/usage/configuration/

version: "2"

linters:
  enable:
    - errcheck      # unchecked errors
    - govet         # go vet
    - ineffassign   # assignments never used
    - staticcheck   # comprehensive static analysis (includes gosimple)
    - gofmt         # formatting
    - goimports     # import grouping/ordering
    - misspell      # common spelling mistakes
    - noctx         # http calls without context
    - bodyclose     # response body not closed
    - unused        # unused code

linters-settings:
  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/NguyenIslandBoy/daily-news

  misspell:
    locale: US

  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

  max-issues-per-linter: 50
  max-same-issues: 10