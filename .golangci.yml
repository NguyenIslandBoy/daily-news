# .golangci.yml
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck       # unchecked errors
    - gosimple       # simplification suggestions
    - govet          # go vet
    - ineffassign    # assignments that are never used
    - staticcheck    # comprehensive static analysis
    - unused         # unused code
    - gofmt          # formatting
    - goimports      # import grouping/ordering
    - misspell       # common spelling mistakes
    - godot          # period at end of comments
    - noctx          # http calls without context
    - bodyclose      # response body not closed

linters-settings:
  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/NguyenIslandBoy/daily-news

  misspell:
    locale: US

  errcheck:
    # Allow ignoring error on Close() — common pattern
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close

issues:
  exclude-rules:
    # Test files: relax some rules
    - path: _test\.go
      linters:
        - errcheck
        - godot

  max-issues-per-linter: 50
  max-same-issues: 10