# .golangci.yml
# https://golangci-lint.run/usage/configuration/
# Compatible with golangci-lint v1.64.x

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck       # unchecked errors
    - govet          # go vet
    - ineffassign    # assignments that are never used
    - staticcheck    # comprehensive static analysis (includes gosimple)
    - gofmt          # formatting
    - goimports      # import grouping/ordering
    - misspell       # common spelling mistakes
    - noctx          # http calls without context
    - bodyclose      # response body not closed
    - unused         # unused code (v1 name; maps to deadcode internally)

linters-settings:
  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/NguyenIslandBoy/daily-news

  misspell:
    locale: US

  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

  max-issues-per-linter: 50
  max-same-issues: 10