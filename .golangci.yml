# .golangci.yml
# Compatible with golangci-lint v2.4.0+
# https://golangci-lint.run/docs/configuration/file/

version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gofmt
    - goimports
    - misspell
    - noctx
    - bodyclose
    - unused

  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/NguyenIslandBoy/daily-news
    misspell:
      locale: US
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 50
  max-same-issues: 10